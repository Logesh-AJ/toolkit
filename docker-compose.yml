version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: toolforge-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
    environment:
      - UPLOAD_DIR=uploads
      - OUTPUT_DIR=outputs
      - MAX_FILE_SIZE_MB=100
      - FILE_EXPIRY_MINUTES=30
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: toolforge-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped